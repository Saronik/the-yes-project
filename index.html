<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Yes Project | Empowering You</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        h1 { color: #1a73e8; margin-bottom: 10px; }
        p { color: #5f6368; line-height: 1.6; }
        input[type="email"] { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
        .footer-logo { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Yes Project</h1>
        <p><strong>Your digital nudge for anything that you are not sure about</strong>.</p>
        
        <form action="thankyou.html">
            <input type="email" name="email" placeholder="Enter your email address" required>
            <button type="submit">Sign up for positivity</button>
        </form>

        <div class="footer-logo">Project by the TYP</div>
    </div>
</body>
</html>
